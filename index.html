<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página Sencilla</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 20px;
    }
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

  <header>
    <h1>Bienvenido a mi página</h1>
    <p>Una web sencilla hecha con HTML y CSS</p>
  </header>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Sobre mí</a>
    <a href="#">Contacto</a>
  </nav>

  <div class="container">
    <h2>Inicio</h2>
    <p>Este es un ejemplo de una página web muy básica.</p>

    <h2>Sobre mí</h2>
    <p>Puedes escribir aquí información sobre ti.</p>

    <h2>Contacto</h2>
    <p>Email: ejemplo@email.com</p>
  </div>

  <footer>
    <p>© 2026 Mi Página Web</p>
  </footer>

</body>
</html>
